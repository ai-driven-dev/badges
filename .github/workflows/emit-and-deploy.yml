# Émission signée + publication (#23). Au merge sur main (ou manuellement),
# régénère TOUS les credentials de façon déterministe et déploie le site statique
# sur GitHub Pages : clés publiques, profil issuer, une preuve VC-JWT par membre.
#
# Déterminisme : certified_on = date du commit qui a ajouté data/members/<handle>/record.yml.
# RS256 étant déterministe, régénérer produit le même credential — aucune preuve
# n'est committée, aucun contournement de la protection de main n'est requis.
name: Émettre et publier

on:
  push:
    branches: [main]
    paths:
      - "data/members/**"
      - "data/revoked.json"
      - "keys/**"
      - "public/**"
      - "site/**"
      - ".github/scripts/sign-credential.mjs"
      - ".github/scripts/sign-status-list.mjs"
      - ".github/scripts/build-directory.mjs"
      - ".github/scripts/build-site.sh"
      - ".github/scripts/lib/**"
      - ".github/workflows/emit-and-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: signing   # main uniquement, expose SIGNING_PRIVATE_KEY (pas d'approbation)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # historique complet : dater chaque membre par son commit d'ajout
          lfs: true        # récupérer les vraies photos (objets LFS), pas les pointeurs

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Installer les dépendances des scripts
        run: cd .github/scripts && npm ci

      - name: Construire le site (signe + assemble _site)
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: bash .github/scripts/build-site.sh

      # Pas de CNAME : Pages sert les DONNÉES sur ai-driven-dev.github.io/badges
      # (l'ancre permanente). verify.ai-driven-dev.fr est le site (VPS), pas Pages.

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
