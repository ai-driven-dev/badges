# Déploiement sur le VPS (alternative à GitHub Pages). Calqué sur ai-driven-dev.fr :
# build+signe en cloud GitHub (la clé privée n'y touche jamais le VPS), image nginx
# statique poussée sur GHCR, puis le runner self-hosted fait `docker compose pull && up`.
#
# GATÉ (workflow_dispatch) tant que le VPS n'est pas câblé (voir docs/DEPLOY-VPS.md).
# Quand tout est prêt : ajouter le trigger `push` et retirer emit-and-deploy.yml (Pages).
name: Déployer sur le VPS

on:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build + signe + push GHCR
    runs-on: ubuntu-latest         # GitHub-hosted : la clé privée reste dans le cloud GitHub
    environment: signing           # main uniquement, expose SIGNING_PRIVATE_KEY
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - run: cd .github/scripts && npm ci

      - name: Construire le site (signe + assemble _site)
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: bash .github/scripts/build-site.sh

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Déployer sur le VPS
    needs: build-and-push
    runs-on: [self-hosted, aidd-central]
    permissions:
      packages: read
    environment:
      name: production-vps
    steps:
      - name: Pull + restart le conteneur
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_DIR: ${{ vars.DEPLOY_PATH || '/opt/infrastructure/services/aidd-badges' }}
          CONTAINER: aidd-badges-verify
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          for i in $(seq 1 20); do
            S=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo starting)
            [ "$S" = "healthy" ] && { echo "healthy après ${i}x5s"; break; }
            [ "$i" -eq 20 ] && { echo "PAS healthy"; docker logs --tail 50 "$CONTAINER"; exit 1; }
            sleep 5
          done
          IP=$(docker inspect --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$CONTAINER")
          CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://${IP}:8080/issuer.json" || echo 000)
          [ "$CODE" = "200" ] || { echo "smoke test HTTP $CODE"; exit 1; }
          echo "Déployé, smoke test HTTP $CODE"
          docker logout ghcr.io
