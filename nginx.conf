server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Types corrects pour le code de vérif et les preuves.
  types {
    text/html                             html;
    text/javascript                       mjs;
    application/json                      json;
    image/svg+xml                         svg;
    image/webp                            webp;
  }
  # credential.jwt et status/1 : pas d'extension -> texte brut.
  location ~ /credential\.jwt$ { default_type text/plain; }
  location = /status/1         { default_type text/plain; }

  # CORS en lecture : la vérif indépendante et le site principal lisent ces fichiers.
  add_header Access-Control-Allow-Origin "*" always;

  # Fiche de membre : /u/<handle> -> /u/<handle>/index.html
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
