# Sert le site de vérification sur le VPS. L'image est construite et poussée sur
# GHCR par la CI (après signature) ; le VPS ne fait que pull + up. Le reverse proxy
# de l'infra route verify.ai-driven-dev.fr vers le port publié ci-dessous.
services:
  verify:
    image: ${IMAGE:-ghcr.io/ai-driven-dev/badges:latest}
    container_name: aidd-badges-verify
    ports:
      - "${PORT:-8092}:8080"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/issuer.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
